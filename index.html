<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DES-II Test</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("Y60KpXp6th2GUr2NB"); // Public Key Kamu
       })();
    </script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .question { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        input[type="range"] { width: 100%; }
        button { background: #4CAF50; color: white; padding: 15px; border: none; width: 100%; cursor: pointer; font-size: 16px; border-radius: 5px; }
        #hasil { margin-top: 20px; padding: 15px; background: #e8f5e9; display: none; border-radius: 5px; }
        .identitas { background: #f9f9f9; padding: 15px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #ddd; }
        input[type="text"] { width: 95%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

    <h2>DES-II Screening Test</h2>
    
    <div class="identitas">
        <label><b>Nama Peserta:</b></label><br>
        <input type="text" id="nama_user" placeholder="Masukkan nama lengkap..." required>
    </div>

    <div id="quiz-container">
        <p>Silakan geser persentase sesuai pengalaman Anda (0% - 100%)</p>
        <div class="question">
            <label>20. Merasa hidup tidak nyata</label>
            <input type="range" class="skor" min="0" max="100" value="0" oninput="this.nextElementSibling.innerText = this.value + '%'">
            <span>0%</span>
        </div>
        <div class="question">
            <label>28. Merasa tidak sepenuhnya hadir</label>
            <input type="range" class="skor" min="0" max="100" value="0" oninput="this.nextElementSibling.innerText = this.value + '%'">
            <span>0%</span>
        </div>
    </div>

    <button onclick="prosesHasil()">Hitung Skor & Kirim</button>

    <div id="hasil"></div>

    <script>
        function prosesHasil() {
            const nama = document.getElementById('nama_user').value;
            if (!nama) {
                alert("Mohon isi nama Anda terlebih dahulu!");
                return;
            }

            const sliders = document.querySelectorAll('.skor');
            let total = 0;
            sliders.forEach(s => total += parseInt(s.value));
            
            const rataRata = (total / sliders.length).toFixed(2);
            
            // Tampilkan hasil di layar
            const hasilDiv = document.getElementById('hasil');
            hasilDiv.style.display = 'block';
            hasilDiv.innerHTML = `<h3>Skor Anda: ${rataRata}</h3><p>Data sedang dikirim ke database...</p>`;

            // KIRIM KE EMAILJS
            const templateParams = {
                nama_peserta: nama,
                skor_akhir: rataRata
            };

            emailjs.send('service123', 'template_kcv9mxs', templateParams)
                .then(function() {
                    hasilDiv.innerHTML += `<p style="color:green;"><b>Berhasil! Data sudah masuk ke email admin.</b></p>`;
                }, function(error) {
                    alert("Gagal mengirim data: " + JSON.stringify(error));
                });
        }
    </script>
</body>
</html>
